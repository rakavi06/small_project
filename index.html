<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Scan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333333;
            padding-bottom: 80px;
        }

        /* Scan Input Overlay for Demonstration */
        .scanner-input-container {
            background-color: #f0f4f9;
            padding: 12px 16px;
            border-bottom: 2px solid #0033a0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .scanner-input-container input {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .scanner-input-container button {
            background-color: #0033a0;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* App Header Top Nav */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f0f4f9;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #f0f4f9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .back-btn::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-left: 2.5px solid #0033a0;
            border-bottom: 2.5px solid #0033a0;
            transform: rotate(45deg);
            margin-left: 2px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #1c2434;
            flex-grow: 1;
            text-align: center;
            margin-right: -16px;
        }

        .share-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #0033a0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .share-btn svg {
            width: 16px;
            height: 16px;
            fill: #ffffff;
        }

        /* Main Validation Green Banner */
        .validation-banner {
            background-color: #d1f7dc;
            margin: 8px 16px 16px 16px;
            padding: 12px 16px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .validation-text {
            color: #0f5132;
            font-size: 18px;
            font-weight: 600;
        }

        .checkmark-circle {
            width: 22px;
            height: 22px;
            background-color: #198754;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark-circle::after {
            content: '';
            display: inline-block;
            width: 5px;
            height: 9px;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        /* Section Headings */
        .section-divider {
            border-top: 1px solid #e0e0e0;
            margin-top: 8px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1c2434;
            padding: 16px 16px 8px 16px;
            background-color: #ffffff;
        }

        /* Data Rows and Alternating Backgrounds */
        .data-row {
            padding: 12px 16px;
        }

        .data-row:nth-child(even) {
            background-color: #f4f6fc;
        }

        .data-row:nth-child(odd) {
            background-color: #ffffff;
        }

        .label {
            font-size: 11px;
            font-weight: 700;
            color: #0040a1;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }

        .value {
            font-size: 14px;
            font-weight: 500;
            color: #555555;
            line-height: 1.4;
        }

        /* Unique Row for Status Checkmark */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-value {
            color: #198754;
            font-weight: 600;
            font-size: 14px;
        }

        .small-checkmark {
            width: 16px;
            height: 16px;
            background-color: #198754;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .small-checkmark::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 7px;
            border-right: 1.5px solid #ffffff;
            border-bottom: 1.5px solid #ffffff;
            transform: rotate(45deg);
            margin-bottom: 1px;
        }

        /* Sticky Bottom Action Button */
        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #0033a0;
            color: #ffffff;
            text-align: center;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
        }

        /* Placeholder state message when no code is scanned yet */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #777777;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="scanner-input-container">
        <input type="text" id="barcodeScannerInput" placeholder="Scan barcode or type 75022026..." autofocus>
        <button onclick="handleManualScan()">Scan</button>
    </div>

    <header class="app-header">
        <div class="back-btn"></div>
        <h1 class="header-title">Result</h1>
        <div class="share-btn">
            <svg viewBox="0 0 24 24">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
            </svg>
        </div>
    </header>

    <div id="pageContent">
        <div class="empty-state">Waiting for a barcode scan event...</div>
    </div>

    <div class="footer-action" onclick="resetPage()">
        Finish
    </div>

    <script>
        // Simulated Secure Local Database keyed by the unique Barcode ID
        const barcodeDatabase = {
            "7502202602150172361": {
                signatureStatus: "Valid",
                docTypeEtranger: "Attestation de dépôt d'une demande de titre de séjour",
                numDemande: "7502202602150172361",
                dateDepot: "15/02/2026",
                autorisation: "AUTORISE A TRAVAILLER",
                numEtranger: "NEANT",
                nomPatronymique: "RAVEEDRAN",
                nomUsage: "NEANT",
                prenoms: "VASANTH",
                genre: "Masculin",
                dateNaissance: "27/10/1999",
                lieuNaissance: "KILINOCHCHI",
                paysNaissance: "Sri Lanka",
                nationalite: "Sri Lanka",
                adresseLigne4: "39 RUE DES CHEMINOTS",
                codePostal: "75018",
                commune: "PARIS",
                categorieTitre: "VICTIME DE TEH",
                codePaysAdresse: "France",
                headerDocType: "Document étranger",
                authCertification: "FR06",
                idCertificat: "DGE0",
                dateEmissionCachet: "15/02/2026",
                dateCreationSignature: "15/02/2026",
                paysEmetteur: "France"
            }
        };

        // Standard logic listening to physical hardware barcode guns (sends input quickly + executes Enter)
        document.getElementById('barcodeScannerInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                processScan(this.value.trim());
                this.value = ''; // clear input field automatically after read
            }
        });

        function handleManualScan() {
            const inputField = document.getElementById('barcodeScannerInput');
            processScan(inputField.value.trim());
            inputField.value = '';
        }

        // Looks up dataset and builds the matching interface directly
        function processScan(scannedCode) {
            const contentContainer = document.getElementById('pageContent');
            const record = barcodeDatabase[scannedCode];

            if (record) {
                contentContainer.innerHTML = `
                    <div class="validation-banner">
                        <span class="validation-text">${record.signatureStatus}</span>
                        <div class="checkmark-circle"></div>
                    </div>

                    <div class="section-divider"></div>
                    <h2 class="section-title">Validity data</h2>
                    <div class="data-row">
                        <div class="label">Signature Status</div>
                        <div class="status-container">
                            <span class="status-value">${record.signatureStatus}</span>
                            <div class="small-checkmark"></div>
                        </div>
                    </div>

                    <div class="section-divider"></div>
                    <h2 class="section-title">Message data</h2>
                    <div class="data-row"><div class="label">Type de document étranger</div><div class="value">${record.docTypeEtranger}</div></div>
                    <div class="data-row"><div class="label">Numéro de la demande de document étranger</div><div class="value">${record.numDemande}</div></div>
                    <div class="data-row"><div class="label">Date de dépôt de la demande</div><div class="value">${record.dateDepot}</div></div>
                    <div class="data-row"><div class="label">Autorisation</div><div class="value">${record.autorisation}</div></div>
                    <div class="data-row"><div class="label">Numéro d'étranger</div><div class="value">${record.numEtranger}</div></div>
                    <div class="data-row"><div class="label">Nom patronymique</div><div class="value">${record.nomPatronymique}</div></div>
                    <div class="data-row"><div class="label">Nom d'usage</div><div class="value">${record.nomUsage}</div></div>
                    <div class="data-row"><div class="label">Liste des prénoms</div><div class="value">${record.prenoms}</div></div>
                    <div class="data-row"><div class="label">Genre</div><div class="value">${record.genre}</div></div>
                    <div class="data-row"><div class="label">Date de naissance</div><div class="value">${record.dateNaissance}</div></div>
                    <div class="data-row"><div class="label">Lieu de naissance</div><div class="value">${record.lieuNaissance}</div></div>
                    <div class="data-row"><div class="label">Pays de naissance</div><div class="value">${record.paysNaissance}</div></div>
                    <div class="data-row"><div class="label">Nationalité</div><div class="value">${record.nationalite}</div></div>
                    <div class="data-row"><div class="label">Ligne 4 de l'adresse postale du domicile</div><div class="value">${record.adresseLigne4}</div></div>
                    <div class="data-row"><div class="label">Code postal ou code cedex de l'adresse postale du domicile</div><div class="value">${record.codePostal}</div></div>
                    <div class="data-row"><div class="label">Commune de l'adresse postale du domicile</div><div class="value">${record.commune}</div></div>
                    <div class="data-row"><div class="label">Catégorie du titre</div><div class="value">${record.categorieTitre}</div></div>
                    <div class="data-row"><div class="label">Code pays de l'adresse postale du domicile</div><div class="value">${record.codePaysAdresse}</div></div>

                    <div class="section-divider"></div>
                    <h2 class="section-title">Header data</h2>
                    <div class="data-row"><div class="label">Document type</div><div class="value">${record.headerDocType}</div></div>
                    <div class="data-row"><div class="label">Identifiant de l'autorité de certification</div><div class="value">${record.authCertification}</div></div>
                    <div class="data-row"><div class="label">Identifiant du certificat</div><div class="value">${record.idCertificat}</div></div>
                    <div class="data-row"><div class="label">Date d'émission du cachet électronique</div><div class="value">${record.dateEmissionCachet}</div></div>
                    <div class="data-row"><div class="label">Date de création de la signature électronique</div><div class="value">${record.dateCreationSignature}</div></div>
                    <div class="data-row"><div class="label">Pays émetteur du document</div><div class="value">${record.paysEmetteur}</div></div>
                `;
            } else {
                contentContainer.innerHTML = `<div class="empty-state" style="color: #dc3545;">Error: Barcode "${scannedCode}" not found in database.</div>`;
            }
        }

        function resetPage() {
            document.getElementById('pageContent').innerHTML = '<div class="empty-state">Waiting for a barcode scan event...</div>';
        }
    </script>
</body>
</html>
